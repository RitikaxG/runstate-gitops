apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runstate
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd-image-updater.argoproj.io/image-list: api=ghcr.io/ritikaxg/runstate-api
    argocd-image-updater.argoproj.io/api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/api.allow-tags: regexp:^main-[a-f0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: runstate
  source:
    repoURL: git@github.com:RitikaxG/runstate-gitops.git
    targetRevision: main
    path: apps/runstate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runstate
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: runstate
  source:
    repoURL: git@github.com:RitikaxG/runstate-gitops.git
    targetRevision: main
    path: apps/runstate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
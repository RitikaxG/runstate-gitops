apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/RitikaxG/runstate-gitops.git
    targetRevision: main
    path: infra/argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
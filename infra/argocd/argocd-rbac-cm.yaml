# This is the RBAC configuration for ArgoCD.
# ArgoCD reads this ConfigMap and builds its authorization rules.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly # Any user who logs into ArgoCD but does not match a rule will get readonly access.
  policy.csv: |
    p, role:admin, applications,*,*/*,allow
    p, role:admin, clusters, get, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow

    g, runstate-admin, role:admin
# Tells ArgoCD where your infrastructure configuration lives and what it should manage automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runstate-root
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/RitikaxG/runstate-gitops.git
    targetRevision: main
    path: bootstrap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true